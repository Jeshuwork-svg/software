
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>School Election System</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.07);
    padding:20px;
    margin-top:20px;
    border-radius:15px;
}

input,select,button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

button{
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.hidden{display:none;}

.position{
    margin-top:15px;
    padding:15px;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginPage">
<h1>🏫 School Election System</h1>

<input id="studentName" placeholder="Name">
<select id="houseSelect">
<option value="">Select House</option>
<option>Chera</option>
<option>Chola</option>
<option>Pandya</option>
<option>Pallava</option>
</select>

<button onclick="startVoting()">Start Voting</button>
<button onclick="showAdminLogin()">Admin</button>
</div>

<!-- ADMIN LOGIN -->
<div class="card hidden" id="adminLogin">
<h2>Admin Login</h2>
<input type="password" id="adminPassword">
<button onclick="adminLogin()">Login</button>
</div>

<!-- VOTING -->
<div class="card hidden" id="votingPage"></div>

<!-- ADMIN -->
<div class="card hidden" id="adminPage"></div>

<!-- HOUSE ADMIN -->
<div class="card hidden" id="houseAdminPage">
<h1>🏠 House Captain Admin</h1>

<select id="houseSelectAdmin" onchange="loadHousePanel()">
<option value="">Select House</option>
<option>Chera</option>
<option>Chola</option>
<option>Pandya</option>
<option>Pallava</option>
</select>

<div id="housePanel"></div>

<button onclick="backToAdmin()">Back</button>
</div>

</div>

<script>

/* ---------------- DATA ---------------- */

let electionData = JSON.parse(localStorage.getItem("electionData")) || {
posts:[
{title:"SPL Boys",key:"splb",candidates:["Arun","Kavin"]},
{title:"SPL Girls",key:"splg",candidates:["Priya","Nila"]},
{title:"ASPL Boys",key:"asplb",candidates:["Vishal","Ragul"]},
{title:"ASPL Girls",key:"asplg",candidates:["Anu","Keerthi"]},
{title:"Sports Boys",key:"spb",candidates:["Harish","Ajay"]},
{title:"Sports Girls",key:"spg",candidates:["Mithra","Divya"]}
],

houseCaptains:{
Chera:{boys:["C1","C2"],girls:["C3","C4"]},
Chola:{boys:["C5","C6"],girls:["C7","C8"]},
Pandya:{boys:["C9","C10"],girls:["C11","C12"]},
Pallava:{boys:["C13","C14"],girls:["C15","C16"]}
}
};

let results = JSON.parse(localStorage.getItem("results")) || {};

/* ---------------- SAVE ---------------- */
function save(){
localStorage.setItem("electionData",JSON.stringify(electionData));
}

/* ---------------- REMOVE POST ---------------- */
function removePost(key){
if(!confirm("Delete post?")) return;
electionData.posts = electionData.posts.filter(p=>p.key!==key);
save();
loadAdmin();
}

/* ---------------- REMOVE CANDIDATE ---------------- */
function removeCandidate(postKey,name){
let post = electionData.posts.find(p=>p.key===postKey);
post.candidates = post.candidates.filter(c=>c!==name);
save();
loadAdmin();
}

/* ---------------- ADD POST ---------------- */
function addPost(){
let t=document.getElementById("newPostTitle").value;
let k=document.getElementById("newPostKey").value;
if(!t||!k) return alert("Fill all");

electionData.posts.push({title:t,key:k,candidates:[]});
save();
loadAdmin();
}

/* ---------------- ADD CANDIDATE ---------------- */
function addCandidate(){
let key=document.getElementById("candidatePost").value;
let name=document.getElementById("candidateName").value;

let p=electionData.posts.find(x=>x.key===key);
p.candidates.push(name);

save();
loadAdmin();
}

/* ---------------- VOTING ---------------- */
function startVoting(){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("votingPage").classList.remove("hidden");
renderVoting();
}

function renderVoting(){
let html="<h1>Voting</h1>";

electionData.posts.forEach(p=>{
html+=`<div class='position'><h3>${p.title}</h3>`;

p.candidates.forEach(c=>{
html+=`
<label>
<input type='radio' name='${p.key}' value='${c}'> ${c}
</label><br>`;
});

html+="</div>";
});

html+="<button onclick='submitVote()'>Submit</button>";
document.getElementById("votingPage").innerHTML=html;
}

function submitVote(){
electionData.posts.forEach(p=>{
let s=document.querySelector(`input[name="${p.key}"]:checked`);

if(s){
if(!results[p.title]) results[p.title]={};
if(!results[p.title][s.value]) results[p.title][s.value]=0;
results[p.title][s.value]++;
}
});

localStorage.setItem("results",JSON.stringify(results));
alert("Vote Submitted!");
location.reload();
}

/* ---------------- ADMIN ---------------- */
function showAdminLogin(){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("adminLogin").classList.remove("hidden");
}

function adminLogin(){
if(document.getElementById("adminPassword").value==="admin123"){
document.getElementById("adminLogin").classList.add("hidden");
document.getElementById("adminPage").classList.remove("hidden");
loadAdmin();
}else alert("Wrong password");
}

/* ---------------- ADMIN PANEL ---------------- */
function loadAdmin(){

let html="<h1>Admin Panel</h1>";

/* ADD POST */
html+=`
<div class="card">
<h3>Add Post</h3>
<input id="newPostTitle">
<input id="newPostKey">
<button onclick="addPost()">Add Post</button>
</div>
`;

/* ADD CANDIDATE */
html+=`
<div class="card">
<h3>Add Candidate</h3>
<select id="candidatePost">
`;

electionData.posts.forEach(p=>{
html+=`<option value="${p.key}">${p.title}</option>`;
});

html+=`
</select>
<input id="candidateName">
<button onclick="addCandidate()">Add Candidate</button>
</div>
`;

/* POSTS */
html+="<h2>Posts</h2>";

electionData.posts.forEach(p=>{
html+=`
<div class="position">
<h3>${p.title}</h3>
`;

p.candidates.forEach(c=>{
html+=`
<div style="display:flex;gap:10px;margin-top:8px;">
<input value="${c}" readonly>
<button onclick="removeCandidate('${p.key}','${c}')" style="background:red;">
Remove Candidate
</button>
</div>
`;
});

html+=`
<button onclick="removePost('${p.key}')" style="background:red;margin-top:10px;">
Remove Post
</button>
</div>
`;
});

/* HOUSE ADMIN + RESET */
html+=`
<button onclick="openHouseAdmin()">🏠 House Admin</button>
<button onclick="reset()">Reset</button>

<br><br>

<button onclick="logoutAdmin()" style="background:red;">
Logout
</button>

<br><br>

<h2>📊 Results</h2>
`;

for(let p in results){
for(let c in results[p]){
html+=`
<p>${p} - ${c} : ${results[p][c]}</p>
`;
}
}

document.getElementById("adminPage").innerHTML=html;
}

/* ---------------- HOUSE ADMIN ---------------- */
function openHouseAdmin(){
document.getElementById("adminPage").classList.add("hidden");
document.getElementById("houseAdminPage").classList.remove("hidden");
}

function backToAdmin(){
document.getElementById("houseAdminPage").classList.add("hidden");
document.getElementById("adminPage").classList.remove("hidden");
}

function loadHousePanel(){

let h=document.getElementById("houseSelectAdmin").value;
if(!h) return;

let d=electionData.houseCaptains[h];

let html="<div class='position'><h2>"+h+" House</h2>";

html+="<h3>Boys</h3>";
d.boys.forEach((c,i)=>{
html+=`
<div style="display:flex;gap:10px;margin-top:8px;">
<input value="${c}" readonly>
<button onclick="removeHouse('${h}','boys',${i})">X</button>
</div>`;
});

html+=`
<input id='boy'>
<button onclick="addHouse('${h}','boys')">Add Boy</button>
`;

html+="<h3>Girls</h3>";
d.girls.forEach((c,i)=>{
html+=`
<div style="display:flex;gap:10px;margin-top:8px;">
<input value="${c}" readonly>
<button onclick="removeHouse('${h}','girls',${i})">X</button>
</div>`;
});

html+=`
<input id='girl'>
<button onclick="addHouse('${h}','girls')">Add Girl</button>
</div>
`;

document.getElementById("housePanel").innerHTML=html;
}

function addHouse(h,type){
let id=type==="boys"?"boy":"girl";
let v=document.getElementById(id).value;

electionData.houseCaptains[h][type].push(v);
save();
loadHousePanel();
}

function removeHouse(h,type,i){
electionData.houseCaptains[h][type].splice(i,1);
save();
loadHousePanel();
}

/* ---------------- RESET + LOGOUT ---------------- */
function reset(){
localStorage.removeItem("results");
results={};
loadAdmin();
}

function logoutAdmin(){
location.reload();
}

</script>

</body>
</html>
